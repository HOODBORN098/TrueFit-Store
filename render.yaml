services:
  - type: web
    name: truefit-backend
    runtime: python
    rootDir: truefit_backend
    buildCommand: pip install -r requirements.txt
    releaseCommand: python manage.py migrate --noinput
    startCommand: gunicorn truefit_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: truefit-db
          property: connectionString
      - key: DEBUG
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SETTINGS_MODULE
        value: "truefit_backend.settings"
      - key: SECRET_KEY
        generateValue: true
