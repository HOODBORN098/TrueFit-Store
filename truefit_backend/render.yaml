services:
  - type: web
    name: truefit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn truefit_backend.wsgi:application --bind 0.0.0.0:\
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: truefit-db
          property: connectionString
      - key: DEBUG
        value: "True"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
